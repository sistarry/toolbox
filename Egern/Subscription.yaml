name: 订阅流量监控
description: 显示机场/代理订阅的剩余流量、套餐总量与到期时间
env_schema:
  SUBSCRIPTION_URL:
    name: 订阅链接
    description: 你的订阅地址，例如：https://example.com/subscribe?token=xxx（必填）
    default_value: ''
  SUBSCRIPTION_NAME:
    name: 订阅名称
    description: 显示在组件上的订阅名称
    default_value: SUBSCRIPTION
  REFRESH_HOURS:
    name: 刷新间隔（小时）
    description: 组件自动刷新间隔，范围 0.5 ~ 24
    default_value: '2'
  SUBSCRIPTION_USER_AGENT:
    name: 自定义 User-Agent
    description: 可选，指定请求订阅时使用的 User-Agent（留空则自动尝试常见客户端标识）
    default_value: ''
  PLAN_TOTAL_GB:
    name: 套餐总流量 (GB)
    description: 当订阅只返回剩余流量、未返回总量时，用此值估算套餐总量
    default_value: '100'
  RESET_DAY:
    name: 流量重置日
    description: 每月几号重置流量（1~31）。留空则不显示重置倒计时
    default_value: ''
dns: {}
scriptings:
- generic:
    name: 订阅流量监控-Subscription
    script_url: https://raw.githubusercontent.com/sistarry/toolbox/refs/heads/main/Egern/SubTraffic.js
widgets:
- name: 订阅流量监控-Subscription
  script_name: 订阅流量监控-Subscription