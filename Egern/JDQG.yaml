name: 京东去广告
description: |-
  1.过滤京东标准版广告与弹窗
  2.过滤京东极速版广告
  3.移除基础配置中的监控与日志上报
  此插件仅支持京东标准模式。
open_url: https://apps.apple.com/app/id414245413
author: RuCu6, Maasea, MuTu, 苍井灰灰, mw418, 可莉🅥
homepage: https://github.com/sooyaaabo/Egern
icon: https://raw.githubusercontent.com/sooyaaabo/IconLibrary/main/App/Jingdong.png
dns: {}
rules:
- url_regex:
    match: ^http:\/\/\w{32}\.jddebug\.com\/diagnose\?
    policy: REJECT
url_rewrites:
- match: ^http:\/\/\w{32}\.jddebug\.com\/diagnose\?
  location: http://reject/
  status_code: 307
- match: ^https?:\/\/api\.m\.jd\.com\/client\.action\?functionId=getWidgetV1052
  location: http://reject/
  status_code: 307
body_rewrites:
- response_regex:
    match: ^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=lite_advertising
    find: jdLiteAdvertisingVO
    replace: sooyaaabo
- response_jq:
    match: ^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=basicConfig
    filter: if (getpath(["data","JDMessage","socketmonitor"]) | has("isSocketEstablishedAhead")) then (setpath(["data","JDMessage","socketmonitor","isSocketEstablishedAhead"]; 0)) else . end
- response_jq:
    match: ^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=basicConfig
    filter: if (getpath(["data","JDMessage","socketmonitor"]) | has("isSocketReport")) then (setpath(["data","JDMessage","socketmonitor","isSocketReport"]; 0)) else . end
- response_jq:
    match: ^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=basicConfig
    filter: if (getpath(["data","JDHttpToolKit","httpdns"]) | has("httpdns")) then (setpath(["data","JDHttpToolKit","httpdns","httpdns"]; 0)) else . end
map_locals:
- match: ^https?:\/\/m\.360buyimg\.com\/mobilecms\/s1125x2436_jfs
  status_code: 200
  body: ' '
- match: ^https:\/\/api\.m\.jd\.com\/\?loginType=11
  status_code: 200
  headers:
    Content-Type: application/json
  body: '{}'
- match: ^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=(?:searchBoxWord|stationPullService|uniformRecommend[06])
  status_code: 200
  headers:
    Content-Type: application/json
  body: '{}'
scriptings:
- http_response:
    name: '[京东]移除广告'
    match: ^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=(?:deliverLayer|getTabHomeInfo|myOrderInfo|orderTrackBusiness|personinfoBusiness|start|welcomeHome)
    script_url: https://kelee.one/Resource/JavaScript/JD/JD_remove_ads.js
    body_required: true
- http_response:
    name: '[京东]移除京东极速版广告'
    match: ^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=lite_advertising
    script_url: https://loon.103516.xyz/Script/CommonScript/replace-body.js
    env:
      _compat.$argument: jdLiteAdvertisingVO -> sooyaaabo
    body_required: true
mitm:
  hostnames:
    includes:
    - api.m.jd.com
    - m.360buyimg.com